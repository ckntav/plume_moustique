<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi des piqûres de Plume</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #fdf6ee;
      color: #3d2b1f;
      min-height: 100vh;
    }

    header {
      background: #7a4a2a;
      color: #fdf6ee;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    header h1 { font-size: 1.5rem; font-weight: normal; letter-spacing: 0.02em; }
    header .paw { font-size: 1.8rem; }

    .layout {
      display: flex;
      gap: 0;
      min-height: calc(100vh - 65px);
    }

    /* 3D panel */
    .panel-3d {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background: #fdf6ee;
    }

    .hint {
      font-size: 0.85rem;
      color: #8a6050;
      margin-bottom: 12px;
      text-align: center;
    }

    #canvas-container {
      width: 100%;
      max-width: 560px;
      height: 420px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(122,74,42,0.18);
      cursor: crosshair;
      background: #e8d5c0;
      position: relative;
    }

    #canvas-container canvas { display: block; }

    .mode-bar {
      margin-top: 14px;
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 9px 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 0.88rem;

      transition: all 0.15s;

    .btn-primary {
      background: #c0392b;
      color: white;

    .btn-primary:hover { background: #a93226; }
    .btn-secondary {
      background: #d4a97a;
      color: #3d2b1f;
    }
    .btn-secondary:hover { background: #c49060; }
    .btn.active {
      box-shadow: 0 0 0 3px #c0392b;
    }

    /* Journal panel */
    .panel-journal {
      width: 320px;
      background: #fff8f2;
      border-left: 2px solid #e8c9a8;
      display: flex;
      flex-direction: column;
    }

    .journal-header {
      padding: 16px 18px 10px;
      border-bottom: 1px solid #e8c9a8;
    }
    .journal-header h2 { font-size: 1rem; font-weight: normal; color: #7a4a2a; }

    .filter-bar {
      padding: 10px 18px;
      border-bottom: 1px solid #e8c9a8;
      display: flex;
      gap: 8px;
    }
    .filter-btn {
      padding: 4px 12px;
      border-radius: 12px;
      border: 1px solid #d4a97a;
      background: white;
      font-size: 0.8rem;
      cursor: pointer;
      color: #7a4a2a;
      font-family: inherit;
    }
    .filter-btn.active {
      background: #7a4a2a;
      color: white;
      border-color: #7a4a2a;
    }

    #bite-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
    }

    .bite-item {
      background: white;
      border: 1px solid #e8c9a8;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      position: relative;

    .bite-item .bite-date { font-size: 0.75rem; color: #a07050; }
    .bite-item .bite-zone { font-size: 0.9rem; font-weight: bold; margin: 2px 0; }
    .bite-item .bite-controls {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      align-items: center;
    }
    .bite-item select {
      font-size: 0.75rem;
      border: 1px solid #d4a97a;
      border-radius: 8px;
      padding: 2px 6px;
      background: #fdf6ee;
      color: #3d2b1f;
      font-family: inherit;
    }
    .bite-delete {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: #c0392b;
      font-size: 1rem;
      line-height: 1;
      padding: 0 4px;
    }
    .status-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 1px 8px;
      border-radius: 10px;
      margin-left: 6px;

    .status-nouvelle { background: #fde8e8; color: #c0392b; }
    .status-guerison { background: #fef3e2; color: #d4850a; }
    .status-guerie { background: #e8f5e9; color: #2e7d32; }

    .empty-state {
      text-align: center;
      color: #b0907a;
      padding: 40px 20px;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* Note modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 1rem; margin-bottom: 14px; color: #7a4a2a; }
    .modal textarea {
      width: 100%;
      height: 80px;
      border: 1px solid #d4a97a;
      border-radius: 8px;
      padding: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      resize: none;
      background: #fdf6ee;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      justify-content: flex-end;
    }
  </style>

<header>
  <span class="paw">🐾</span>
  <h1>Suivi des piqûres de Plume</h1>
</header>

<div class="layout">
  <div class="panel-3d">
    <p class="hint">Faites tourner Plume avec la souris. En mode <strong>marquer</strong>, cliquez sur son corps pour ajouter une piqûre.</p>
    <div id="canvas-container"></div>
    <div class="mode-bar">
      <button class="btn btn-secondary" id="btn-rotate">Tourner</button>

      <button class="filter-btn" data-filter="all">Toutes</button>

</div>

<!-- Modal note -->
<div class="modal-overlay" id="modal-overlay">

      <button class="btn btn-secondary" id="modal-cancel">Annuler</button>
      <button class="btn btn-primary" id="modal-confirm">Enregistrer</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---- Scene setup ----
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe8d5c0);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(0, 1.4, 5.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1.1, 0);
controls.minDistance = 3;
controls.maxDistance = 9;

// Lights
const ambientLight = new THREE.AmbientLight(0xfff5e8, 0.7);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
dirLight.position.set(3, 5, 4);
dirLight.castShadow = true;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xe8d0b0, 0.4);
fillLight.position.set(-3, 2, -2);
scene.add(fillLight);

// Ground shadow
const groundGeo = new THREE.PlaneGeometry(8, 8);
const groundMat = new THREE.ShadowMaterial({ opacity: 0.15 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.05;
ground.receiveShadow = true;
scene.add(ground);

// ---- Materials ----
const C_FUR_MID   = 0x7b4f28;  // brun moyen principal
const C_FUR_DARK  = 0x4e2f10;  // brun foncé (oreilles, pattes)
const C_FUR_LIGHT = 0xa87040;  // brun clair (tête, poitrail)
const C_NOSE      = 0x1a100a;
const C_EYE       = 0x180e08;
const C_COLLAR    = 0x3a9e8a;  // collier sarcelle comme dans la photo

function mat(color, rough = 0.92) {
  return new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: 0.04 });
}

// Bump pseudo-aléatoire déterministe (sin) pour fourrure bouclée cohérente
function fluffyGeo(rx, ry, rz, detail = 2, jitter = 0.18) {
  const geo = new THREE.IcosahedronGeometry(1, detail);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const seed = Math.sin(i * 127.1 + 311.7) * 43758.5453;
    const n = 1 + (seed - Math.floor(seed) - 0.5) * jitter;
    pos.setXYZ(i, x * rx * n, y * ry * n, z * rz * n);
  }
  geo.computeVertexNormals();
  return geo;
}

// Tube suivant une CatmullRom
function tube(pts, radius, segs = 24, radSegs = 8) {
  const curve = new THREE.CatmullRomCurve3(pts.map(p => new THREE.Vector3(...p)));
  return { geo: new THREE.TubeGeometry(curve, segs, radius, radSegs, false), curve };
}

function mesh(geo, color, rough) {
  const m = new THREE.Mesh(geo, mat(color, rough));
  m.castShadow = true;
  return m;
}

// ============================================================
// PLUME — goldendoodle brun, élancé, vue 3/4 avant
// Système de coordonnées: Y=haut, Z=avant (museau), X=droite
// Hauteur totale ~2.4 unités, sol à Y=0
// ============================================================
const plume = new THREE.Group();
scene.add(plume);

// --- CORPS ---
// Torse principal: ellipsoïde allongé et mince
const torsoGeo = fluffyGeo(0.44, 0.36, 0.82, 3, 0.12);
const torsoMesh = mesh(torsoGeo, C_FUR_MID);
torsoMesh.position.set(0, 1.08, 0);
plume.add(torsoMesh);

// Poitrail (légèrement plus large et rond en avant)
const chestGeo = fluffyGeo(0.40, 0.34, 0.36, 2, 0.14);
const chestMesh = mesh(chestGeo, C_FUR_MID);
chestMesh.position.set(0, 1.0, 0.60);
plume.add(chestMesh);

// Croupe (arrière légèrement plus haute)
const rumGeo = fluffyGeo(0.40, 0.38, 0.34, 2, 0.13);
const rumMesh = mesh(rumGeo, C_FUR_MID);
rumMesh.position.set(0, 1.14, -0.62);
plume.add(rumMesh);

// --- COU ---
// Long et fin, incliné vers l'avant/le haut
const neckCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, 1.22, 0.38),
  new THREE.Vector3(0, 1.48, 0.56),
  new THREE.Vector3(0, 1.72, 0.62),
]);
const neckGeo = new THREE.TubeGeometry(neckCurve, 12, 0.155, 10, false);
const neckMesh = mesh(neckGeo, C_FUR_MID);
plume.add(neckMesh);

// --- TÊTE ---
// Ronde, couverte de boucles denses
const headGeo = fluffyGeo(0.32, 0.30, 0.30, 3, 0.20);
const headMesh = mesh(headGeo, C_FUR_LIGHT);
headMesh.position.set(0, 1.96, 0.76);
plume.add(headMesh);

// Toupet (top-knot) — caractéristique du goldendoodle
const topKnotGeo = fluffyGeo(0.22, 0.20, 0.20, 2, 0.25);
const topKnotMesh = mesh(topKnotGeo, C_FUR_LIGHT);
topKnotMesh.position.set(0, 2.22, 0.70);
plume.add(topKnotMesh);

// Museau — cylindrique et court
const snoutGeo = fluffyGeo(0.145, 0.11, 0.19, 1, 0.10);
const snoutMesh = mesh(snoutGeo, C_FUR_LIGHT);
snoutMesh.position.set(0, 1.86, 0.96);
plume.add(snoutMesh);

// Nez
const noseMesh2 = mesh(new THREE.SphereGeometry(0.052, 10, 8), C_NOSE, 0.45);
noseMesh2.position.set(0, 1.88, 1.12);
plume.add(noseMesh2);

// Yeux — expressifs avec reflet
for (const s of [-1, 1]) {
  const eyeM = mesh(new THREE.SphereGeometry(0.044, 10, 8), C_EYE, 0.25);
  eyeM.position.set(s * 0.155, 2.02, 0.96);
  plume.add(eyeM);
  // Sourcil bouclé
  const browGeo = fluffyGeo(0.10, 0.055, 0.055, 0, 0.15);
  const browM = mesh(browGeo, C_FUR_DARK);
  browM.position.set(s * 0.16, 2.09, 0.94);
  plume.add(browM);
  // Reflet
  const shine = new THREE.Mesh(
    new THREE.SphereGeometry(0.016, 6, 4),
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.05, metalness: 0.2 })
  );
  shine.position.set(s * 0.165, 2.028, 0.992);
  plume.add(shine);
}

// --- OREILLES tombantes et bouclées ---
for (const s of [-1, 1]) {
  const earG = new THREE.Group();
  // Flap supérieur
  const topE = mesh(fluffyGeo(0.14, 0.18, 0.10, 1, 0.18), C_FUR_DARK);
  earG.add(topE);
  // Flap inférieur (tombe le long de la tête)
  const botE = mesh(fluffyGeo(0.12, 0.24, 0.09, 1, 0.16), C_FUR_DARK);
  botE.position.set(0, -0.30, 0.04);
  earG.add(botE);
  // Pointe de l'oreille (arrondie)
  const tipE = mesh(fluffyGeo(0.10, 0.10, 0.08, 0, 0.12), C_FUR_DARK);
  tipE.position.set(s * 0.02, -0.54, 0.06);
  earG.add(tipE);
  earG.position.set(s * 0.30, 2.02, 0.68);
  earG.rotation.z = s * 0.15;
  earG.rotation.x = 0.20;
  plume.add(earG);
}

// --- COLLIER (sarcelle comme dans la photo) ---
const collarGeo = new THREE.TorusGeometry(0.195, 0.030, 10, 32);
const collarMesh = new THREE.Mesh(collarGeo, mat(C_COLLAR, 0.5));
collarMesh.position.set(0, 1.65, 0.60);
collarMesh.rotation.x = Math.PI * 0.30;
plume.add(collarMesh);

// --- PATTES ---
// 4 pattes avec cuisse + jambe + patte, légèrement articulées
// Goldendoodle élancé: pattes longues (~1 unité), fines
const legDefs = [
  // [attachX, attachZ, thighAngleX, shinAngleX]
  { x: -0.26, z:  0.52, tx: -0.05, sx:  0.10, front: true  },  // av-gauche
  { x:  0.26, z:  0.52, tx: -0.05, sx:  0.10, front: true  },  // av-droit
  { x: -0.28, z: -0.55, tx:  0.08, sx: -0.06, front: false },  // ar-gauche
  { x:  0.28, z: -0.55, tx:  0.08, sx: -0.06, front: false },  // ar-droit
];

const legMeshes = [];
for (const d of legDefs) {
  const g = new THREE.Group();
  g.position.set(d.x, 1.0, d.z);

  // Cuisse (haut)
  const thighGeo = new THREE.CapsuleGeometry(0.085, 0.42, 6, 8);
  const thighM = mesh(thighGeo, d.front ? C_FUR_MID : C_FUR_MID);
  thighM.position.set(0, -0.22, 0);
  thighM.rotation.x = d.tx;
  g.add(thighM);

  // Genou
  const kneeGeo = fluffyGeo(0.092, 0.092, 0.092, 1, 0.10);
  const kneeM = mesh(kneeGeo, C_FUR_MID);
  kneeM.position.set(0, -0.48, d.front ? 0.04 : -0.04);
  g.add(kneeM);

  // Jambe (bas) — plus fine
  const shinGeo = new THREE.CapsuleGeometry(0.062, 0.40, 6, 8);
  const shinM = mesh(shinGeo, C_FUR_DARK);
  shinM.position.set(0, -0.74, d.front ? 0.04 : -0.04);
  shinM.rotation.x = d.sx;
  g.add(shinM);

  // Patte (pied)
  const pawGeo = fluffyGeo(0.10, 0.065, 0.12, 1, 0.12);
  const pawM = mesh(pawGeo, C_FUR_DARK);
  pawM.position.set(0, -1.02, d.front ? 0.06 : -0.05);
  g.add(pawM);

  plume.add(g);
  legMeshes.push(g);
}

// --- QUEUE plumeau ---
// Recourbée vers le haut depuis la croupe, gros pompon au bout
const tailPts = [
  [0, 1.22, -0.90],
  [0, 1.52, -1.12],
  [0, 1.92, -1.10],
  [0, 2.22, -0.88],
  [0, 2.42, -0.62],
];
const tailCurve = new THREE.CatmullRomCurve3(tailPts.map(p => new THREE.Vector3(...p)));
const tailTubeGeo = new THREE.TubeGeometry(tailCurve, 24, 0.065, 8, false);
const tailTubeMesh = mesh(tailTubeGeo, C_FUR_DARK);
plume.add(tailTubeMesh);

// Boucles progressivement plus grosses vers le bout (pompon)
for (let i = 0; i < 14; i++) {
  const t = 0.38 + i * 0.048;
  const pt = tailCurve.getPoint(Math.min(t, 1));
  const r = 0.07 + i * 0.022;
  const bGeo = fluffyGeo(r, r * 0.90, r, i > 8 ? 1 : 0, 0.22);
  const bMesh = mesh(bGeo, i > 9 ? C_FUR_LIGHT : C_FUR_DARK);
  bMesh.position.copy(pt);
  plume.add(bMesh);
}

// Gather all body meshes for raycasting (exclure shine/reflets)
const bodyMeshes = [];
plume.traverse(child => {
  if (child.isMesh) {
    const c = child.material.color;
    // exclure blanc (reflets) et collier
    if (c.r < 0.95 && !(c.r < 0.25 && c.g > 0.55 && c.b > 0.50)) {
      bodyMeshes.push(child);
    }
  }
});

// ---- Bite markers ----
const biteSpheres = [];

function addBiteMarker(position, id) {
  const geo = new THREE.SphereGeometry(0.10, 12, 10);
  const bMat = new THREE.MeshStandardMaterial({
    color: 0xff2222,
    roughness: 0.3,
    metalness: 0.1,
    transparent: false,
    emissive: 0x880000,
    emissiveIntensity: 0.4,
  });
  const m = new THREE.Mesh(geo, bMat);
  m.position.copy(position);
  m.userData.biteId = id;

  // Anneau pulsant bien visible
  const ringGeo = new THREE.RingGeometry(0.12, 0.18, 24);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xff4444, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.userData.isRing = true;
  m.add(ring);

  plume.add(m);
  biteSpheres.push(m);
  return m;
}

function removeBiteMarker(id) {
  const idx = biteSpheres.findIndex(m => m.userData.biteId === id);
  if (idx !== -1) {
    plume.remove(biteSpheres[idx]);
    biteSpheres.splice(idx, 1);
  }
}

// ---- Zone name from position ----
function zoneName(pos) {
  const y = pos.y, z = pos.z, x = pos.x;
  const side = x < -0.1 ? ' gauche' : x > 0.1 ? ' droit' : '';
  if (y > 1.0) return 'Tête / oreilles';
  if (y > 0.65) return 'Cou' + side;
  if (y < -0.5) return 'Patte' + side;
  if (z < -0.5) return 'Dos arrière' + side;
  if (z > 0.5) return 'Poitrail' + side;
  return 'Dos' + side;
}

// ---- LocalStorage ----
function loadBites() {
  try { return JSON.parse(localStorage.getItem('plume_bites') || '[]'); } catch { return []; }
}
function saveBites(bites) {
  localStorage.setItem('plume_bites', JSON.stringify(bites));
}

// Piqûres initiales issues de la piqûre map (19 juin 2026)
const SEED_BITES = [
  // --- Côté conducteur (gauche) ---
  { id:'s1',  date:'2026-06-19T14:00:00.000Z', zone:'Intérieur cuisse gauche', note:'', status:'guerison', px:-0.12, py:0.55, pz:-0.55 },
  { id:'s2',  date:'2026-06-19T14:01:00.000Z', zone:'Intérieur cuisse gauche', note:'', status:'guerison', px:-0.10, py:0.44, pz:-0.58 },
  { id:'s3',  date:'2026-06-19T14:02:00.000Z', zone:'Intérieur cuisse gauche', note:'', status:'guerison', px:-0.15, py:0.64, pz:-0.52 },
  { id:'s4',  date:'2026-06-19T14:03:00.000Z', zone:'Aisselle gauche',          note:'', status:'guerison', px:-0.19, py:0.88, pz:0.50 },
  { id:'s5',  date:'2026-06-19T14:04:00.000Z', zone:'Bras avant gauche',        note:'en ligne avec aisselle', status:'guerison', px:-0.27, py:0.76, pz:0.52 },
  // --- Côté passager (droite) ---
  { id:'s6',  date:'2026-06-19T14:05:00.000Z', zone:'Bedaine droite',           note:'', status:'guerison', px:0.16, py:0.72, pz:0.08 },
  { id:'s7',  date:'2026-06-19T14:06:00.000Z', zone:'Bedaine droite',           note:'', status:'guerison', px:0.22, py:0.67, pz:0.16 },

function seedIfEmpty() {
  const existing = loadBites();
  // Fusionne les seeds avec les données existantes (par id)
  const existingIds = new Set(existing.map(b => b.id));
  const merged = [...existing, ...SEED_BITES.filter(b => !existingIds.has(b.id))];
  saveBites(merged);
  return merged;
}

let bites = seedIfEmpty();

// Restore markers
bites.forEach(b => addBiteMarker(new THREE.Vector3(b.px, b.py, b.pz), b.id));

// ---- UI rendering ----
let currentFilter = 'today';

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fr-CA', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });
}

function renderJournal() {
  const list = document.getElementById('bite-list');
  const filtered = currentFilter === 'today'
    ? bites.filter(b => b.date.startsWith(todayStr()))
    : bites;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">Aucune piqûre${currentFilter === 'today' ? " aujourd'hui" : ''}.<br>Cliquez sur Plume pour en marquer une.</div>`;
    return;
  }

  const sorted = [...filtered].sort((a, b) => b.date.localeCompare(a.date));
  list.innerHTML = sorted.map(b => `
    <div class="bite-item" data-id="${b.id}">
      <div class="bite-date">${formatDate(b.date)}</div>
      <div class="bite-zone">${b.zone}<span class="status-badge status-${b.status}">${statusLabel(b.status)}</span></div>
      ${b.note ? `<div style="font-size:0.8rem;color:#8a6050;margin-top:3px;">${escHtml(b.note)}</div>` : ''}
      <div class="bite-controls">
        <select onchange="updateStatus('${b.id}', this.value)">
          <option value="nouvelle" ${b.status==='nouvelle'?'selected':''}>Nouvelle</option>
          <option value="guerison" ${b.status==='guerison'?'selected':''}>En guérison</option>
          <option value="guerie" ${b.status==='guerie'?'selected':''}>Guérie</option>
        </select>
        <button class="bite-delete" onclick="deleteBite('${b.id}')" title="Supprimer">✕</button>
      </div>
    </div>
  `).join('');
}

function statusLabel(s) {
  return { nouvelle: 'Nouvelle', guerison: 'En guérison', guerie: 'Guérie' }[s] || s;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.updateStatus = function(id, status) {
  const b = bites.find(x => x.id === id);
  if (b) { b.status = status; saveBites(bites); renderJournal(); }
};
window.deleteBite = function(id) {
  bites = bites.filter(x => x.id !== id);
  saveBites(bites);
  removeBiteMarker(id);
  renderJournal();
};

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderJournal();
  });
});

renderJournal();

// ---- Mode (rotate vs mark) ----
let markMode = true;

const btnRotate = document.getElementById('btn-rotate');
const btnMark = document.getElementById('btn-mark');

btnRotate.addEventListener('click', () => {
  markMode = false;
  controls.enabled = true;
  container.style.cursor = 'grab';
  btnRotate.classList.add('active');
  btnMark.classList.remove('active');
});
btnMark.addEventListener('click', () => {
  markMode = true;
  controls.enabled = false;
  container.style.cursor = 'crosshair';
  btnMark.classList.add('active');
  btnRotate.classList.remove('active');
});

// Start in mark mode
controls.enabled = false;

// ---- Pending bite ----
let pendingPos = null;
let pendingZone = null;

// ---- Raycasting / click ----
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

container.addEventListener('click', e => {
  if (!markMode) return;

  const rect = container.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(bodyMeshes, false);
  if (hits.length === 0) return;

  const hit = hits[0];
  // Convert hit point to plume local space
  const localPt = plume.worldToLocal(hit.point.clone());
  pendingPos = localPt;
  pendingZone = zoneName(localPt);

  document.getElementById('modal-zone').textContent = 'Zone: ' + pendingZone;
  document.getElementById('modal-note').value = '';
  document.getElementById('modal-overlay').classList.add('visible');
});

document.getElementById('modal-cancel').addEventListener('click', () => {
  pendingPos = null;
  document.getElementById('modal-overlay').classList.remove('visible');
});

document.getElementById('modal-confirm').addEventListener('click', () => {
  if (!pendingPos) return;
  const note = document.getElementById('modal-note').value.trim();
  const id = 'b' + Date.now();
  const bite = {
    id,
    date: new Date().toISOString(),
    zone: pendingZone,
    note,
    status: 'nouvelle',
    px: pendingPos.x, py: pendingPos.y, pz: pendingPos.z,
  };
  bites.push(bite);
  saveBites(bites);
  addBiteMarker(pendingPos, id);
  renderJournal();
  pendingPos = null;
  document.getElementById('modal-overlay').classList.remove('visible');
});

// ---- Animate ----
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  // Gentle idle breathing
  plume.scale.y = 1 + Math.sin(t * 1.1) * 0.012;

  // Pulse bite rings
  biteSpheres.forEach(m => {
    const ring = m.children.find(c => c.userData.isRing);
    if (ring) {
      const s = 1 + Math.sin(t * 3) * 0.25;
      ring.scale.set(s, s, 1);
      ring.material.opacity = 0.5 - Math.sin(t * 3) * 0.3;
      ring.lookAt(camera.position);
    }
  });

  controls.update();
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
